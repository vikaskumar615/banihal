function diffcal(diff,diff1)
{

	const smallrows = small.trim().split('\n');
	for(var i=1;i<smallrows.length;i++)
	{

		colheader = row[0];

			result=row[parseInt(pivot)+1];
			return result;
		}

function cal_mslp()
{
	var td = document.getElementById("td").value;
	td = eval(td)-0.1;
	var slp = document.getElementById("slp").value;
	var row="",rowheader="",diff="",mslp="",pivot="";
	
	const bigrows = big.trim().split('\n');
	for(var i=1;i<bigrows.length;i++)
	{
		row = bigrows[i].trim().split(',');
		rowheader = row[0].trim().split(" to ");
		if(parseFloat(td)>=parseFloat(rowheader[0]) && parseFloat(td)<=parseFloat(rowheader[1]))
		{
			diff=(slp%2).toFixed(1);
			console.log(diff);
			if(diff == "0.0" || diff == "0")
			{
				mslp = slp;
				pivot = Math.floor((slp-820)/2).toFixed(0);
				
				mslp = row[parseInt(pivot)+1];
				console.log("1st part = " + mslp);
				return mslp;
			}
			else
			{
				mslp=slp-diff;
				pivot = Math.floor((slp-820)/2).toFixed(0);
				console.log("pivot=" + pivot);
				mslp = row[parseInt(pivot)+1];
				console.log("2nd part = " + mslp);
				var nextval = row[parseInt(pivot)+2];
				mslp = parseFloat(mslp) + parseFloat(diffcal(diff,nextval-mslp));
				console.log(mslp);
				return mslp;
			}
		}
	}
}

function cal_tdrh() 
{	
	var msl_height=1623.70; var dp=0; var rh=0; var vp=0;
	var td = document.getElementById("td").value;
	var tw = document.getElementById("tw").value;

	if((td!='')  && (tw!='') && (msl_height!='') )
	{
	var h = eval(msl_height);
	var TD = eval(td)-0.0; //dont change it even value required
	var TW = eval(tw)-0.0;
	
	if( h < 457.2) 					{ var P=1000; }
	if( h >= 457.2 && h < 1524) 	{ var P=900; }
	if( h >= 1524 && h < 2743.2) 	{ var P=800; }
	if( h >= 2743.2) 				{ var P=700; }

	var A = 17.26; 	var B = 35.86;
	//-------------------------------------------------------
	var TDK	=	TD + 273.16;
	// alert(TDK);
	
	if(TDK < 273.16)	{ var A = 21.87;	var B = 7.66; }
	var A1 = A * ( (TDK - 273.16) / (TDK - B) );
	var ES = 6.11 * Math.exp(A1);
	//-------------------------------------------------------
	var QS = 0.622 * ( ES /(P-0.378 * ES) );
	//-------------------------------------------------------
	var TWK = TW + 273.16; 
	if(TWK < 273.16)	{ var A=21.87;	var B=7.66; }
	var A2 = A * ( (TWK - 273.16) / (TWK - B) );
	var EWS = 6.11 * Math.exp(A2);
	//-------------------------------------------------------
	if(TW < 0)
	{	var C = P * ( 0.480*(TD-TW)/(671-TW) );	}
	else
	{	var C = P * ( 0.480*(TD-TW)/(610-TW) );	}	
	var E = EWS - C;
	var E1 = (EWS).toFixed(1) - (C).toFixed(1);
	//alert(E);
	//-------------------------------------------------------
	var DP;
	var RH;
	if(E < 0)
	{
		RH = 1234;
		DP = 1234;
		
		if(TD == TW) {  DP = TD; }
		if(RH > 100) {  RH = 1234; }
	}
	else
	{
		RH = E * (100/ES);
		if(RH > 100) {  DP = 1234; }
		if(TD == TW) { DP = TD; }
	} 
	//-------------------------------------------------------
	var Q = 0.622 * ( E /(P-0.378 * E) );

	var TDD = TDK;
	var XT = TDD;
	 A=17.26;
	 B=35.86;
	// alert(A); 
	if(XT < 273.16)	{A=21.87; B=7.66;}
	var AA = A * (XT - 273.16)/(XT - B);
	var EDS = 6.11 * Math.exp(AA);
	var QDS = 0.622 * EDS/(P - 0.378 * EDS);
	//alert(QDS);
	TDD = TDD - 0.01;
	while(QDS > Q)
	{
	 XT = TDD;
	 A = 17.26;
	 B = 35.86; //alert(XT);
	 if(XT < 273.16)	{A=21.87; B=7.66;}
	 AA = A * (XT - 273.16)/(XT - B);
	 EDS = 6.11 * Math.exp(AA);
	 QDS = 0.622 * EDS / (P - 0.378 * EDS);
	TDD = TDD - 0.01;
	//alert(QDS + "--" + TDD);
	}
	//alert(TDD);	
	 DP = TDD + 0.01 - 273.16;
	 console.log("TD = "+TD);
	 console.log("TW = "+TW);
	 console.log("DP = "+DP);
	 console.log("RH = "+RH);
	 console.log("VP = "+E1);
	//alert(DP);
	//-------------------------------------------------------
	if (DP=='1234' || RH=='1234') 
	{ document.getElementById("cal").innerHTML = "DP=null<br>RH=null<br>VP=null";} 
	else 
	{ 
		dp = (DP).toFixed(1);
		rh = Math.round(RH);
		vp = (E1).toFixed(1);
		mslp = cal_mslp();
		document.getElementById("cal").innerHTML = "<br><font color=blue>Dew Point</font> : <font color=green><b>"+(DP).toFixed(1)+"</b></font><br><font color=blue>R-Humidity</font> : <font color=green><b>"+Math.round(RH)+"</b> %</font><br><font color=blue>V-Pressure</font> : <font color=green><b>"+(E1).toFixed(1)+"</b><br><font color=blue>MSLP</font> : <font color=raddish><b>"+mslp+"</b></font>"; 
		
		//document.getElementById("cal").innerHTML = "<br><table border=0><tr><td><font color=blue>Dew Point :</font></td><td><font color=green><b>"+(DP).toFixed(1)+"</b></font></td></tr><tr><td><font color=blue>Relative Humidity :</font></td><td><font color=green><b>"+Math.round(RH)+"</b> %</font></td></tr><tr><td><font color=blue>Vapour Pressure :</font></td><td><font color=green><b>"+(E1).toFixed(1)+"</b></font></td></tr></table><br><button class="btn" onclick="copyjscode()">Copy js</button>";
	
	}
	//-------------------------------------------------------	
	}
}
